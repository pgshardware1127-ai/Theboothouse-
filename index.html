<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Boothouse - Shoe Store</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 5px;
        }

        header p {
            font-size: 1.1em;
            color: #ecf0f1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Categories Section */
        .categories-section {
            margin: 30px 0;
        }

        .categories-heading {
            text-align: center;
            font-size: 2em;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .categories {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .category-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid transparent;
        }

        .category-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0,0,0,0.15);
            border-color: #3498db;
        }

        .category-card h2 {
            font-size: 1.5em;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .category-card p {
            color: #7f8c8d;
            font-size: 0.95em;
        }

        .category-card .item-count {
            display: inline-block;
            background-color: #3498db;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            margin-top: 10px;
            font-size: 0.9em;
        }

        /* Products Section */
        .products-section {
            margin: 30px 0;
            display: none;
        }

        .products-section.active {
            display: block;
        }

        .products-heading {
            font-size: 1.8em;
            margin-bottom: 20px;
            color: #2c3e50;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            background-color: #95a5a6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: 0.3s;
        }

        .back-btn:hover {
            background-color: #7f8c8d;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0,0,0,0.15);
        }

        .product-image {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2em;
            font-weight: bold;
        }

        .product-info {
            padding: 15px;
        }

        .product-info h3 {
            font-size: 1.2em;
            margin-bottom: 8px;
            color: #2c3e50;
        }

        .product-info p {
            color: #7f8c8d;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .product-price {
            font-size: 1.3em;
            color: #e74c3c;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .view-sizes-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.95em;
            width: 100%;
            transition: 0.3s;
        }

        .view-sizes-btn:hover {
            background-color: #2980b9;
        }

        /* Sizes Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .modal-price {
            font-size: 1.3em;
            color: #e74c3c;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .sizes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .size-btn {
            padding: 12px;
            border: 2px solid #bdc3c7;
            background-color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .size-btn:hover {
            border-color: #3498db;
            background-color: #ecf0f1;
        }

        .size-btn.selected {
            background-color: #3498db;
            color: white;
            border-color: #3498db;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .close-btn, .add-to-cart-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: 0.3s;
        }

        .close-btn {
            background-color: #95a5a6;
            color: white;
        }

        .close-btn:hover {
            background-color: #7f8c8d;
        }

        .add-to-cart-btn {
            background-color: #27ae60;
            color: white;
        }

        .add-to-cart-btn:hover {
            background-color: #229954;
        }

        .add-to-cart-btn:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }

        .success-message {
            background-color: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 5px;
            margin-top: 10px;
            display: none;
        }

        .success-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <header>
        <h1>👞 The Boothouse</h1>
        <p>Premium Quality Shoes for Everyone</p>
    </header>

    <div class="container">
        <!-- Categories Section -->
        <div id="categoriesSection" class="categories-section">
            <h2 class="categories-heading">Select a Category</h2>
            <div class="categories" id="categoriesContainer"></div>
        </div>

        <!-- Products Section -->
        <div id="productsSection" class="products-section">
            <div class="products-heading">
                <span id="productsCategoryName"></span>
                <button class="back-btn" onclick="goBackToCategories()">← Back</button>
            </div>
            <div class="products" id="productsContainer"></div>
        </div>
    </div>

    <!-- Sizes Modal -->
    <div id="sizesModal" class="modal">
        <div class="modal-content">
            <div class="modal-header" id="modalProductName"></div>
            <div class="modal-price" id="modalProductPrice"></div>
            
            <label style="font-weight: bold; display: block; margin-bottom: 15px;">Select Size:</label>
            <div class="sizes-grid" id="sizesGrid"></div>

            <div class="success-message" id="successMessage">✓ Added to cart!</div>

            <div class="modal-buttons">
                <button class="close-btn" onclick="closeModal()">Close</button>
                <button class="add-to-cart-btn" id="addToCartBtn" onclick="addToCart()" disabled>Add to Cart</button>
            </div>
        </div>
    </div>

    <script>
        // Products Data
        const products = {
            menShoes: {
                categoryName: "Men's Shoes",
                categoryId: 1,
                items: [
                    { id: 101, name: "Formal Black Oxford", price: 4999, sizes: ["6", "7", "8", "9", "10", "11", "12"] },
                    { id: 102, name: "Casual Brown Sneaker", price: 3499, sizes: ["6", "7", "8", "9", "10", "11", "12"] },
                    { id: 103, name: "Sports Running Shoe", price: 5999, sizes: ["6", "7", "8", "9", "10", "11", "12"] }
                ]
            },
            womenShoes: {
                categoryName: "Women's Shoes",
                categoryId: 2,
                items: [
                    { id: 201, name: "Red Heels", price: 3999, sizes: ["4", "5", "6", "7", "8", "9"] },
                    { id: 202, name: "Comfortable Flats", price: 2499, sizes: ["4", "5", "6", "7", "8", "9"] },
                    { id: 203, name: "White Sneakers", price: 3299, sizes: ["4", "5", "6", "7", "8", "9"] }
                ]
            },
            kidsShoes: {
                categoryName: "Kids' Shoes",
                categoryId: 3,
                items: [
                    { id: 301, name: "School Black Shoes", price: 1999, sizes: ["1", "2", "3", "4", "5"] },
                    { id: 302, name: "Casual Colorful Sneaker", price: 1799, sizes: ["1", "2", "3", "4", "5"] },
                    { id: 303, name: "Kids Sports Shoes", price: 2299, sizes: ["1", "2", "3", "4", "5"] }
                ]
            },
            sportsShoes: {
                categoryName: "Sports Shoes",
                categoryId: 4,
                items: [
                    { id: 401, name: "Running Shoes Pro", price: 6999, sizes: ["6", "7", "8", "9", "10", "11", "12"] },
                    { id: 402, name: "Basketball Shoes", price: 7999, sizes: ["6", "7", "8", "9", "10", "11", "12"] },
                    { id: 403, name: "Cricket Shoes", price: 5499, sizes: ["6", "7", "8", "9", "10", "11", "12"] }
                ]
            }
        };

        let selectedSize = null;
        let currentProduct = null;

        // Initialize - Load Categories
        function initializeApp() {
            displayCategories();
        }

        // Display all categories
        function displayCategories() {
            const container = document.getElementById('categoriesContainer');
            container.innerHTML = '';

            Object.keys(products).forEach(key => {
                const category = products[key];
                const card = document.createElement('div');
                card.className = 'category-card';
                card.onclick = () => selectCategory(key, category.categoryName);
                
                card.innerHTML = `
                    <h2>${category.categoryName}</h2>
                    <p>Shop our collection</p>
                    <span class="item-count">${category.items.length} items</span>
                `;
                
                container.appendChild(card);
            });
        }

        // Select category and show products
        function selectCategory(categoryKey, categoryName) {
            const category = products[categoryKey];
            document.getElementById('categoriesSection').style.display = 'none';
            document.getElementById('productsSection').classList.add('active');
            document.getElementById('productsCategoryName').textContent = categoryName;

            const container = document.getElementById('productsContainer');
            container.innerHTML = '';

            category.items.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                
                card.innerHTML = `
                    <div class="product-image">👟</div>
                    <div class="product-info">
                        <h3>${product.name}</h3>
                        <p>${product.name}</p>
                        <div class="product-price">₹${product.price.toLocaleString('en-IN')}</div>
                        <button class="view-sizes-btn" onclick="openSizesModal(${product.id}, '${product.name}', ${product.price})">View Sizes</button>
                    </div>
                `;
                
                container.appendChild(card);
            });
        }

        // Go back to categories
        function goBackToCategories() {
            document.getElementById('categoriesSection').style.display = 'block';
            document.getElementById('productsSection').classList.remove('active');
        }

        // Open sizes modal
        function openSizesModal(productId, productName, price) {
            selectedSize = null;
            currentProduct = { id: productId, name: productName, price: price };

            // Find product to get sizes
            let productSizes = [];
            for (let key in products) {
                const found = products[key].items.find(item => item.id === productId);
                if (found) {
                    productSizes = found.sizes;
                    break;
                }
            }

            document.getElementById('modalProductName').textContent = productName;
            document.getElementById('modalProductPrice').textContent = `₹${price.toLocaleString('en-IN')}`;

            // Display sizes
            const sizesGrid = document.getElementById('sizesGrid');
            sizesGrid.innerHTML = '';
            productSizes.forEach(size => {
                const btn = document.createElement('button');
                btn.className = 'size-btn';
                btn.textContent = size;
                btn.onclick = () => selectSize(btn, size);
                sizesGrid.appendChild(btn);
            });

            document.getElementById('sizesModal').classList.add('active');
        }

        // Select size
        function selectSize(element, size) {
            document.querySelectorAll('.size-btn').forEach(btn => btn.classList.remove('selected'));
            element.classList.add('selected');
            selectedSize = size;
            document.getElementById('addToCartBtn').disabled = false;
        }

        // Add to cart
        function addToCart() {
            if (selectedSize) {
                const message = `${currentProduct.name} (Size: ${selectedSize}) - ₹${currentProduct.price}`;
                alert('✓ Added to Cart!\n\n' + message);
                
                document.getElementById('successMessage').classList.add('show');
                setTimeout(() => {
                    closeModal();
                    document.getElementById('successMessage').classList.remove('show');
                }, 1500);
            }
        }

        // Close modal
        function closeModal() {
            document.getElementById('sizesModal').classList.remove('active');
            selectedSize = null;
            document.getElementById('addToCartBtn').disabled = true;
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('sizesModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        // Start app
        initializeApp();
    </script>
</body>
</html>
